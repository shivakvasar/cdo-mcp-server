name: CI

# Runs the test suite on pushes and PRs against `main`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      # 1) Check out the repository so we can install and run tests.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up Python and let setup-python handle pip caching itself.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3) Install the package (pulls in its one real dependency, `mcp`,
      #    from pyproject.toml) plus pytest to run the test suite.
      - name: Install project and test dependencies
        run: python -m pip install -e . pytest

      # 4) Run the test suite.
      - name: Run tests
        run: pytest -q tests
