name: CI

# This workflow runs the project's tests on push and pull requests to `master`.
# It demonstrates a minimal Python CI flow with dependency caching and a
# secret injected for any steps that need the Anthropic API key.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Exposed for future tests that actually call Claude. The current suite
    # (BOSS/tests/test_mapper.py) never calls the API — its own docstring
    # says so — and constructing anthropic.Anthropic() doesn't validate the
    # key, so this isn't required for CI to pass today. Left wired up so
    # nothing breaks the moment an integration test needs a real key; remove
    # if that never materializes. Add the secret at: Settings → Secrets and
    # variables → Actions → New repository secret
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      # 1) Check out the repository so we can install and run tests.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up Python, pin a tested version, and let setup-python handle
      #    pip caching itself (cache: 'pip' hashes **/requirements.txt for
      #    the cache key, same as a hand-rolled actions/cache step would).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3) Upgrade pip, then install project dependencies from `requirements.txt`.
      #    Installing from a requirements file keeps CI consistent with local dev.
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # 4) Run the test suite. Adjust the path if you add more tests later.
      - name: Run tests
        run: pytest -q BOSS/tests

      # Optional: upload test reports or coverage artifacts here if needed.

