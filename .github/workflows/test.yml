name: CI

# Runs the test suite on pushes and PRs against `main`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    services:
      # Mirrors docker-compose.yml's local Postgres, minus the init-script
      # volumes (GitHub Actions service containers don't support custom
      # mounts) — schema.sql and the cdo_test database are set up by hand
      # in the "Set up database schema" step below instead.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cdo
          POSTGRES_PASSWORD: cdo
          POSTGRES_DB: cdo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cdo -d cdo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      # Matches tests/test_server.py's TEST_DATABASE_URL/DEV_DATABASE_URL
      # defaults, just spelled out explicitly here for clarity.
      DATABASE_URL: postgresql://cdo:cdo@localhost:5432/cdo
      TEST_DATABASE_URL: postgresql://cdo:cdo@localhost:5432/cdo_test

    steps:
      # 1) Check out the repository so we can install and run tests.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up Python and let setup-python handle pip caching itself.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3) Install the package (pulls in its real dependencies, `mcp` and
      #    `psycopg`, from pyproject.toml) plus pytest to run the test suite.
      - name: Install project and test dependencies
        run: python -m pip install -e . pytest

      # 4) Apply schema.sql to both the dev ("cdo") and test ("cdo_test")
      #    databases. ubuntu-latest runners ship psql preinstalled.
      - name: Set up database schema
        env:
          PGPASSWORD: cdo
        run: |
          psql -h localhost -U cdo -d cdo -f schema.sql
          psql -h localhost -U cdo -d postgres -c "CREATE DATABASE cdo_test"
          psql -h localhost -U cdo -d cdo_test -f schema.sql

      # 5) Seed the dev database the same way local dev does (see README),
      #    so the real_db-marked regression test has real data to check.
      - name: Seed dev database from data/db.json
        run: python scripts/migrate_json_to_postgres.py

      # 6) Run the test suite.
      - name: Run tests
        run: pytest -q tests
