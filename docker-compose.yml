services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cdo
      POSTGRES_PASSWORD: cdo
      POSTGRES_DB: cdo
    ports:
      - "5432:5432"
    volumes:
      # Runs once against an empty data volume — to pick up schema changes
      # on an existing volume, run `docker compose down -v` first.
      # Both files run in alphabetical order: 00-init-test-db.sh (which
      # creates the "cdo_test" database and applies schema.sql to it) runs
      # before schema.sql applies automatically to the main "cdo" database.
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./initdb/00-init-test-db.sh:/docker-entrypoint-initdb.d/00-init-test-db.sh:ro
      - cdo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdo -d cdo"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  cdo_pg_data:
